<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Interactive card details form</title>
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/card.css" />
    <link rel="stylesheet" href="./styles/form.css" />
    <link rel="stylesheet" href="./styles/success.css" />
  </head>
  <body>
    <div class="app">
      <header class="card-preview" aria-label="Card preview">
        <div class="card card--back">
          <span class="card__cvc" data-preview="cvc">000</span>
        </div>

        <div class="card card--front">
          <img src="/images/card-logo.svg" alt="" class="card__logo" />
          <p class="card__number" data-preview="number">0000 0000 0000 0000</p>
          <div class="card__meta">
            <span class="card__name" data-preview="name">Jane Appleseed</span>
            <span class="card__exp">
              <span data-preview="mm">00</span>/<span data-preview="yy">00</span>
            </span>
          </div>
        </div>
      </header>

      <main class="content">
        <form class="form" id="cardForm" novalidate>
          <div class="field">
            <label class="field__label" for="cardholder">Cardholder Name</label>
            <input
              class="field__input"
              type="text"
              id="cardholder"
              name="cardholder"
              placeholder="e.g. Jane Appleseed"
              autocomplete="cc-name"
              aria-describedby="err-cardholder"
            />
            <p class="field__error" id="err-cardholder" role="alert"></p>
          </div>

          <div class="field">
            <label class="field__label" for="cardnumber">Card Number</label>
            <input
              class="field__input"
              type="text"
              id="cardnumber"
              name="cardnumber"
              placeholder="e.g. 1234 5678 9123 0000"
              inputmode="numeric"
              maxlength="19"
              autocomplete="cc-number"
              aria-describedby="err-cardnumber"
            />
            <p class="field__error" id="err-cardnumber" role="alert"></p>
          </div>

          <div class="field-row">
            <fieldset class="field field--exp">
              <legend class="field__label">Exp. Date (MM/YY)</legend>
              <div class="field__exp-inputs">
                <input
                  class="field__input"
                  type="text"
                  id="expmm"
                  name="expmm"
                  placeholder="MM"
                  inputmode="numeric"
                  maxlength="2"
                  aria-label="Expiry month"
                  aria-describedby="err-exp"
                />
                <input
                  class="field__input"
                  type="text"
                  id="expyy"
                  name="expyy"
                  placeholder="YY"
                  inputmode="numeric"
                  maxlength="2"
                  aria-label="Expiry year"
                  aria-describedby="err-exp"
                />
              </div>
              <p class="field__error" id="err-exp" role="alert"></p>
            </fieldset>

            <div class="field field--cvc">
              <label class="field__label" for="cvc">CVC</label>
              <input
                class="field__input"
                type="text"
                id="cvc"
                name="cvc"
                placeholder="e.g. 123"
                inputmode="numeric"
                maxlength="3"
                autocomplete="cc-csc"
                aria-describedby="err-cvc"
              />
              <p class="field__error" id="err-cvc" role="alert"></p>
            </div>
          </div>

          <button type="submit" class="btn btn--primary">Confirm</button>
        </form>

        <article class="success" id="success" hidden>
          <img src="/images/icon-complete.svg" alt="" class="success__icon" />
          <h1 class="success__title">Thank you!</h1>
          <p class="success__text">We've added your card details</p>
          <button type="button" class="btn btn--primary" id="continueBtn">
            Continue
          </button>
        </article>
      </main>

      <footer class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener">Frontend Mentor</a>.
        Coded by <a href="https://github.com/gusanchefullstack" target="_blank" rel="noopener">Gustavo Sanchez</a>.
      </footer>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
